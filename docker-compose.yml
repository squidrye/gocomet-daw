services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ridehailing_api
      POSTGRES_PASSWORD: ridehailing123
      POSTGRES_DB: ridehailingdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ridehailing_api -d ridehailingdb"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  backend:
    build: ./core-api
    ports:
      - "9000:9000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ridehailingdb
      SPRING_DATASOURCE_USERNAME: ridehailing_api
      SPRING_DATASOURCE_PASSWORD: ridehailing123
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./core-web
      args:
        VITE_API_URL: http://localhost:9000/v1
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
